<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Juego de la Oca - 8x8</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Spline+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer base {
  body {
    font-family: "Spline Sans", sans-serif;
    background-color: #f4e4bc;
    background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
  }
}
.board-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  width: 100%;
  aspect-ratio: 1/1;
  border: 4px solid #4e342e;
  background-color: #dcc693;
}
.tile {
  @apply border border-black/30 flex flex-col items-center justify-center relative p-0.5 box-border;
  background-image: radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, transparent 100%);
}
.tile-number { @apply absolute top-0.5 left-1 text-[9px] font-bold text-black/80 font-serif leading-none; }
.tile-icon { @apply text-[18px] leading-none mt-1; }
.tile-goose { background-color: rgba(34, 197, 94, 0.25); }
.tile-bridge { background-color: rgba(59, 130, 246, 0.25); }
.tile-inn { background-color: rgba(249, 115, 22, 0.25); }
.tile-well { background-color: rgba(6, 182, 212, 0.25); }
.tile-labyrinth { background-color: rgba(168, 85, 247, 0.25); }
.tile-prison { background-color: rgba(115, 115, 115, 0.3); }
.tile-death { background-color: rgba(0, 0, 0, 0.3); }
.tile-goal { @apply bg-yellow-400/40 border-2 border-yellow-700/50; }
.player-token { @apply w-3.5 h-3.5 rounded-full border border-white shadow-md absolute z-10 bottom-1 right-1; }
</style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen">

<header class="w-full flex items-center justify-between px-4 py-2 bg-black/10 backdrop-blur-md border-b border-black/10 shrink-0 z-20">
  <div class="flex flex-col">
    <h1 class="text-sm font-bold font-serif uppercase tracking-widest text-brown-900">Oca Cuadrícula 8x8</h1>
    <span class="text-[9px] font-medium text-black/60 tracking-tight" id="turn-info">Turno: Jugador 1 • Casilla 1</span>
  </div>
</header>

<main class="relative w-full max-w-[min(100vw,90vh-100px)] flex flex-col items-center justify-start p-2 flex-1">
  <div id="board" class="board-grid shadow-2xl rounded-sm overflow-hidden"></div>

  <!-- Botón del dado -->
  <div class="absolute bottom-6 right-6 z-30">
    <button id="roll-button" class="w-16 h-16 rounded-full bg-red-600 shadow-2xl border-4 border-white flex flex-col items-center justify-center active:scale-95 transition-all">
      <span class="material-symbols-outlined text-white text-3xl">casino</span>
      <span class="text-[8px] font-bold text-white uppercase leading-none mt-0.5">Roll</span>
    </button>
  </div>
</main>

<footer class="w-full h-14 flex items-center justify-center gap-6 bg-black/10 backdrop-blur-md shrink-0 border-t border-black/10" id="players-footer"></footer>

<script>
// Mapa de casillas especiales
const specialTiles = {
  5: { type: 'tile-goose', icon: 'nest_eco_leaf', color: 'text-green-700' },
  6: { type: 'tile-bridge', icon: 'architecture', color: 'text-blue-700' },
  8: { type: 'tile-goose', icon: 'nest_eco_leaf', color: 'text-green-700' },
  12:{ type: 'tile-bridge', icon: 'architecture', color: 'text-blue-700' },
  14:{ type: 'tile-goose', icon: 'nest_eco_leaf', color: 'text-green-700' },
  18:{ type: 'tile-goose', icon: 'nest_eco_leaf', color: 'text-green-700' },
  19:{ type: 'tile-inn', icon: 'night_shelter', color: 'text-orange-700' },
  27:{ type: 'tile-goose', icon: 'nest_eco_leaf', color: 'text-green-700' },
  31:{ type: 'tile-well', icon: 'water_drop', color: 'text-cyan-700' },
  32:{ type: 'tile-goose', icon: 'nest_eco_leaf', color: 'text-green-700' },
  36:{ type: 'tile-goose', icon: 'nest_eco_leaf', color: 'text-green-700' },
  41:{ type: 'tile-goose', icon: 'nest_eco_leaf', color: 'text-green-700' },
  42:{ type: 'tile-labyrinth', icon: 'grid_guides', color: 'text-purple-700' },
  50:{ type: 'tile-goose', icon: 'nest_eco_leaf', color: 'text-green-700' },
  52:{ type: 'tile-prison', icon: 'lock_open_right', color: 'text-slate-800' },
  54:{ type: 'tile-goose', icon: 'nest_eco_leaf', color: 'text-green-700' },
  58:{ type: 'tile-death', icon: 'skull', color: 'text-white' },
  59:{ type: 'tile-goose', icon: 'nest_eco_leaf', color: 'text-green-700' },
  63:{ type: 'tile-goal', icon: 'emoji_events', color: 'text-yellow-700' },
  64:{ type: 'tile-goal', text: 'FIN' }
};

// Crear tablero dinámico 8x8
const board = document.getElementById('board');
const size = 8;
const totalTiles = 64;
const grid = Array.from({ length: size }, () => Array(size).fill(null));
let x = size - 1, y = 0, dx = 0, dy = 1;
let minX = 0, minY = 0, maxX = size-1, maxY = size-1;

for (let i=1;i<=totalTiles;i++){
  grid[x][y]=i;
  let nx=x+dx, ny=y+dy;
  if(nx<minX||nx>maxX||ny<minY||ny>maxY||grid[nx][ny]!==null){
    if(dx===0&&dy===1){dx=-1;dy=0; maxX--;}
    else if(dx===-1&&dy===0){dx=0;dy=-1; maxY--;}
    else if(dx===0&&dy===-1){dx=1;dy=0; minX++;}
    else if(dx===1&&dy===0){dx=0;dy=1; minY++;}
    nx=x+dx; ny=y+dy;
  }
  x=nx; y=ny;
}

// Crear tiles
for(let i=0;i<size;i++){
  for(let j=0;j<size;j++){
    if(grid[i][j]!==null){
      const n = grid[i][j];
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.style.gridRowStart = i+1;
      tile.style.gridColumnStart = j+1;

      const numSpan = document.createElement('span');
      numSpan.className = 'tile-number';
      numSpan.textContent = n;
      tile.appendChild(numSpan);

      if(specialTiles[n]){
        const spec = specialTiles[n];
        if(spec.type) tile.classList.add(spec.type);
        if(spec.icon){
          const icon = document.createElement('span');
          icon.className = `material-symbols-outlined tile-icon ${spec.color}`;
          icon.textContent = spec.icon;
          tile.appendChild(icon);
        }
        if(spec.text){
          const fin = document.createElement('span');
          fin.className='text-[8px] font-black text-yellow-900 mt-2';
          fin.textContent = spec.text;
          tile.appendChild(fin);
        }
      }

      board.appendChild(tile);
    }
  }
}

// Jugadores
const players = [
  { id:'P1', color:'red-600', position:1 },
  { id:'P2', color:'blue-600', position:1 },
  { id:'P3', color:'yellow-500', position:1 },
  { id:'P4', color:'green-600', position:1 },
];

const footer = document.getElementById('players-footer');
players.forEach(p=>{
  const div = document.createElement('div');
  div.className=`flex items-center gap-1.5 opacity-100`;
  div.innerHTML=`
    <div class="w-3 h-3 rounded-full bg-${p.color} border border-white"></div>
    <span class="text-[10px] font-bold text-black">${p.id}</span>
  `;
  footer.appendChild(div);
});

// Dado
document.getElementById('roll-button').addEventListener('click', ()=>{
  const roll = Math.floor(Math.random()*6)+1;
  alert('Has sacado: '+roll);
});
</script>

</body>
</html>
