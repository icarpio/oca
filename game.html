<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>El Juego de la OCA</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Spline+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
@layer base {
  body { font-family: "Spline Sans", sans-serif; background-color: #f4e4bc; }
}
.board-grid { display: grid; grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(9, 1fr); width: 100%; aspect-ratio:1/1; border:4px solid #4e342e; background-color:#dcc693; }
.tile { @apply border border-black/30 flex flex-col items-center justify-center relative p-0.5 box-border; }
.tile-number {
  @apply absolute top-0.5 left-1 font-bold text-black/80 font-serif leading-none;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 1.2rem;        /* tamaño por defecto (desktop) */
  height: 1.2rem;
  background-color: white;
  border-radius: 50%;
  font-size: 0.75rem;   /* fuente por defecto (desktop) */
  z-index: 15;
  box-shadow: 0 0 1px rgba(0,0,0,0.3);
}

/* Ajustes para móviles */
@media (max-width: 640px) {
  .tile-number {
    width: 0.7rem;
    height: 0.7rem;
    font-size: 0.4rem;
  }
}



.tile-icon {
  width: 24px;   /* tamaño fijo */
  height: 24px;  /* tamaño fijo */
  object-fit: contain; /* no se deforma */
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%); /* centrado exacto */
  z-index: 10;  /* encima del fondo, debajo de jugadores */
}

.tile-goose { background-color: rgba(34, 197, 94, 0.25); }
.tile-bridge { background-color: rgba(59, 130, 246, 0.25); }
.tile-inn { background-color: rgba(249, 115, 22, 0.25); }
.tile-well { background-color: rgba(6, 182, 212, 0.25); }
.tile-labyrinth { background-color: rgba(168, 85, 247, 0.25); }
.tile-prison { background-color: rgba(115, 115, 115, 0.3); }
.tile-dice { background-color: rgba(115, 115, 115, 0.3); }
.tile-death { background-color: rgba(0, 0, 0, 0.3); }
.tile-goal { @apply bg-yellow-400/40 border-2 border-yellow-700/50; }
.player-token { @apply w-3.5 h-3.5 rounded-full border border-white shadow-md absolute z-20 bottom-1 right-1; }
#turn-info { @apply mt-2 text-sm font-semibold text-black; }
#action-info { @apply mt-1 text-xs text-gray-700; }

/* === MEJORA VISUAL JUGADORES EN MISMA CASILLA === */
.tile .players {
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  pointer-events:none;
}

.tile .players.p1 { grid-template-columns:1fr; }
.tile .players.p2 { grid-template-columns:1fr 1fr; }
.tile .players.p3,
.tile .players.p4 {
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
}

/* El token ya NO va fijo abajo-derecha */
.player-token {
  @apply w-3.5 h-3.5 rounded-full border border-white shadow-md relative;
}

</style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen">

<header class="w-full flex items-center justify-center px-4 py-2 bg-black/10 backdrop-blur-md border-b border-black/10 shrink-0 z-20">
  <div class="flex flex-col items-center">
    <h1 class="text-sm font-bold font-serif uppercase tracking-widest text-brown-900">
      El Juego de la OCA
    </h1>
  </div>
</header>

<main class="relative w-full max-w-[min(100vw,90vh-100px)] flex flex-col items-center justify-start p-2 flex-1">
  <div id="board" class="board-grid mt-4 sm:mt-0 shadow-2xl rounded-sm overflow-hidden"></div>
  <span id="turn-info">Turno: -</span>
  <span id="action-info">Tira el dado para decidir quién empieza...</span>

  <div class="absolute bottom-6 right-6 z-30">
    <button id="roll-button" class="w-16 h-16 rounded-full bg-red-600 shadow-2xl border-4 border-white flex flex-col items-center justify-center active:scale-95 transition-all">
      <span class="material-symbols-outlined text-white text-3xl">casino</span>
      <span class="text-[8px] font-bold text-white uppercase leading-none mt-0.5">Roll</span>
    </button>
  </div>
</main>

<footer class="w-full h-14 flex items-center justify-center gap-6 bg-black/10 backdrop-blur-md shrink-0 border-t border-black/10" id="players-footer"></footer>

<script>
// =====================================
// Casillas especiales
// =====================================
const specialTiles = {
  5:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  9:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  14:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  18:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  23:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  27:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  32:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  36:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  41:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  45:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  50:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  54:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  59:{type:'tile-goose', img:'oca.png', msg:'De oca a oca y tiro porque me toca'},
  6:{type:'tile-bridge', img:'puente.png', msg:'De puente a puente y tiro porque me lleva la corriente'},
  12:{type:'tile-bridge', img:'puente.png', msg:'De puente a puente y tiro porque me lleva la corriente'},
  19:{type:'tile-inn', img:'posada.png', msg:'Pierdes 1 turno'},
  26:{type:'tile-dice', img:'dados.png', msg:'Avanzas o retrocedes al otro dado y repites tirada'},
  31:{type:'tile-well', img:'pozo.png', msg:'No puedes tirar hasta que otro jugador pase por aquí'},
  42:{type:'tile-labyrinth', img:'laberinto.png', msg:'Retrocedes a la casilla 30'},
  52:{type:'tile-prison', img:'carcel.png', msg:'Pierdes 2 turnos'},
  53:{type:'tile-dice', img:'dados.png', msg:'Avanzas o retrocedes al otro dado y repites tirada'},
  58:{type:'tile-death', img:'ull.png', msg:'Retrocedes a la casilla 1'},
  63:{type:'tile-goal', img:'meta.png', msg:'¡Has ganado!'}
};

// =====================================
// Tablero y espiral
// =====================================
const board = document.getElementById('board');
const size = 9, totalTiles = 81;
const grid = Array.from({length:size},()=>Array(size).fill(null));
let x=size-1, y=0, dx=0, dy=1, minX=0, minY=0, maxX=size-1, maxY=size-1;

for(let i=1;i<=totalTiles;i++){
  grid[x][y]=i<=63?i:'extra';
  let nx=x+dx, ny=y+dy;
  if(nx<minX||nx>maxX||ny<minY||ny>maxY||grid[nx][ny]){
    if(dx===0&&dy===1){dx=-1;dy=0; maxX--;}
    else if(dx===-1&&dy===0){dx=0;dy=-1; maxY--;}
    else if(dx===0&&dy===-1){dx=1;dy=0; minX++;}
    else{dx=0;dy=1; minY++;}
    nx=x+dx; ny=y+dy;
  }
  x=nx; y=ny;
}

const imgUrl='background.png';
const tileMap={};
for(let i=0;i<size;i++){
  for(let j=0;j<size;j++){
    const val=grid[i][j]; if(!val) continue;
    const tile=document.createElement('div'); tile.className='tile';
    tile.style.gridRowStart=i+1; tile.style.gridColumnStart=j+1;

    if(val==='extra'){ 
      tile.style.backgroundImage=`url(${imgUrl})`; 
      tile.style.backgroundSize='900% 900%'; 
      tile.style.backgroundPosition=`${j*12.5}% ${i*12.5}%`; 
      tile.style.backgroundRepeat='no-repeat'; 
    } else {
      tileMap[val]=tile;
      const num=document.createElement('span'); num.className='tile-number'; num.textContent=val; tile.appendChild(num);
      if(specialTiles[val]){
        const img=document.createElement('img'); img.src=specialTiles[val].img; img.className='tile-icon'; tile.appendChild(img);
        tile.classList.add(specialTiles[val].type);
      }
    }
    board.appendChild(tile);
  }
}

// =====================================
// Nombres aleatorios para IA
// =====================================
const iaNamesPool = [  
  "Lucas",
  "Mateo",
  "Sofia",
  "Edu M",
  "Daniel",
  "Camila",
  "Alex",
  "Lucia",
  "Martin",
  "Paula",
  "Diego",
  "Elena",
  "Andres",
  "Carla",
  "Javier",
  "Irene"];
function getRandomIANames(){
  const pool=[...iaNamesPool]; const selected=[];
  for(let i=0;i<2;i++){ 
    const idx=Math.floor(Math.random()*pool.length); 
    selected.push(pool[idx]); 
    pool.splice(idx,1); 
  }
  return selected;
}
const [ia1Name, ia2Name]=getRandomIANames();

// =====================================
// Jugadores y tokens
// =====================================
const players=[
{id:'Player',color:'red-600',pos:1,skip:0, lastRoll:0, stuckInWell:false},
{id:ia1Name,color:'blue-600',pos:1,skip:0, lastRoll:0, stuckInWell:false},
{id:ia2Name,color:'yellow-500',pos:1,skip:0, lastRoll:0, stuckInWell:false}
];

players.forEach(p=>{
  const token=document.createElement('div'); token.className=`player-token bg-${p.color}`; p.token=token;
  tileMap[1].appendChild(token);
});

const footer=document.getElementById('players-footer');
players.forEach(p=>{
  const div=document.createElement('div'); div.className='flex items-center gap-1.5 opacity-100';
  div.innerHTML=`<div class="w-3 h-3 rounded-full bg-${p.color} border border-white"></div><span class="text-[10px] font-bold text-black">${p.id}</span>`;
  footer.appendChild(div);
});

// =====================================
// Lógica del juego
// =====================================
const geese=[5,9,14,18,23,27,32,36,41,45,50,54,59];
const bridges={6:12,12:6};
let turn=0;
let extraTurn = false;


function updateHeader(msg){
  // Mostrar lo que saca cada jugador y el mensaje de la casilla
  const diceMsg = players.map(pl=>`${pl.id}: ${pl.lastRoll}`).join(' | ');
  document.getElementById('turn-info').textContent=`Turno: ${players[turn].id} • Casilla ${players[turn].pos}`;
  document.getElementById('action-info').textContent = msg ? `${msg} • ${diceMsg}` : diceMsg;
}

const MESSAGE_DELAY = 2500;

function showMessagesSequentially(messages, callback){
  let i = 0;
  const actionInfo = document.getElementById('action-info');

  function next(){
    if(i >= messages.length){
      if(callback) callback();
      return;
    }
    actionInfo.textContent = messages[i];
    i++;
    setTimeout(next, MESSAGE_DELAY);
  }
  next();
}


function move(p, roll){
  p.lastRoll = roll;
  const baseMsg = `${p.id} tira un ${roll}`;
  let messages = [baseMsg];
  
  let target = p.pos + roll;
  if(target > 63) target = 63 - (target - 63);

  p.pos = target;

  // Manejar casillas especiales paso a paso
  function handleSpecial(pos){
    if(specialTiles[pos]?.msg) messages.push(`${p.id} cae en ${pos}: ${specialTiles[pos].msg}`);

    // Puente
    if(bridges[pos]){
      pos = bridges[pos];
      if(specialTiles[pos]?.msg) messages.push(`${p.id} cae en ${pos}: ${specialTiles[pos].msg}`);
    }

    // Oca
    if(geese.includes(pos)){
      const next = geese.find(g => g > pos);
      if(next){
        pos = next;
        extraTurn = true; // 🟢 repetir turno
        messages.push(`${p.id} va de oca a oca y vuelve a tirar`);
        if(specialTiles[pos]?.msg) {
          messages.push(`${p.id} cae en ${pos}: ${specialTiles[pos].msg}`);
        }
      }
    }

    // Dados
    if([26,53].includes(pos)){
      pos = pos === 26 ? 53 : 26;
      if(specialTiles[pos]?.msg) messages.push(`${p.id} cae en ${pos}: ${specialTiles[pos].msg}`);
    }

    // Laberinto
    if(pos === 42){
      pos = 30;
      if(specialTiles[pos]?.msg) messages.push(`${p.id} cae en ${pos}: ${specialTiles[pos].msg}`);
    }

    // Muerte
    if(pos === 58){
      pos = 1;
      if(specialTiles[pos]?.msg) messages.push(`${p.id} cae en ${pos}: ${specialTiles[pos].msg}`);
    }

    return pos;
  }

  p.pos = handleSpecial(p.pos);

  // Posadas, pozo, cárcel
  if([19,52].includes(p.pos)){
    p.skip = specialTiles[p.pos]?.msg.includes('1') ? 1 : 2;
  }


// Pozo (casilla 31)
if(p.pos === 31){
  p.stuckInWell = true;
  messages.push(`${p.id} cae en el pozo y no puede tirar hasta que otro jugador pase`);
}

// Liberar jugadores atrapados si otro pasa por la casilla
players.forEach(other => {
  if(other.stuckInWell && other !== p && p.pos === 31){
    other.stuckInWell = false;
    messages.push(`${other.id} ha sido liberado del pozo porque ${p.id} pasó por ahí`);
  }
});


  // Mover token al tablero al final
  tileMap[p.pos].appendChild(p.token);

  // Mostrar los mensajes secuenciales
  showMessagesSequentially(messages, () => {
  if(p.pos === 63){
    alert(`${p.id} GANA`);
    return;
  }
  nextTurn(); // 🔒 el turno avanza SOLO al terminar los mensajes
});

}

function nextTurn() {

  // 🟢 Si hay turno extra (oca), NO cambiamos de jugador
  if (extraTurn) {
    extraTurn = false;
  } else {
    turn = (turn + 1) % players.length;
  }

  const p = players[turn];

  // ⛔ Saltos de turno (posada, cárcel)
  if (p.skip) {
    p.skip--;
    updateHeader(`${p.id} pierde este turno por casilla especial`);
    setTimeout(nextTurn, 100); // pequeña pausa para actualizar el header
    return;
  }

  // ⛔ Pozo atrapado
  if (p.stuckInWell) {
    updateHeader(`${p.id} está atrapado en el pozo y pierde este turno`);
    setTimeout(nextTurn, 100);
    return;
  }

  updateHeader();

  // 🤖 IA automática
  if (turn !== 0) {
    setTimeout(rollDice, 1500);
  }
}



function rollDice(){
  const p = players[turn];
  const roll = Math.floor(Math.random()*6)+1;
  move(p,roll);
}

// Tirada inicial
function decideStart(){
  const rolls = players.map(p=>Math.floor(Math.random()*6)+1);
  const maxRoll = Math.max(...rolls);
  turn = rolls.indexOf(maxRoll);   // jugador que empieza
  players.forEach((p,i)=>p.lastRoll=rolls[i]);
  updateHeader(`Inicia ${players[turn].id} con un ${players[turn].lastRoll}`);

  // Si empieza una IA, que tire automáticamente
  if(turn !== 0){
    setTimeout(rollDice, 1000);
  }
  // Si empieza P1, dejamos que el jugador haga click en el botón Roll
}


decideStart();
document.getElementById('roll-button').addEventListener('click', rollDice);
</script>

</body>
</html>
